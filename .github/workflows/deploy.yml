name: Deploy to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build the project
        run: npm run build
        env:
          CI: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync with S3 bucket
        run: |
          # Increase concurrency for faster uploads
          aws configure set default.s3.max_concurrent_requests 20
          
          # 1. Upload everything with long-term caching by default (for hashed assets)
          # Using --quiet to reduce logging overhead
          aws s3 sync build/ s3://${{ secrets.AWS_S3_BUCKET_NAME }}/ --delete --cache-control "max-age=31536000, public, immutable" --quiet
          
          # 2. Overwrite entry points and non-hashed files with NO CACHE
          # This ensures the browser always checks for the latest version of the application.
          # We specifically target index.html, manifest.json, and other root files.
          aws s3 cp build/index.html s3://${{ secrets.AWS_S3_BUCKET_NAME }}/index.html --cache-control "no-cache, no-store, must-revalidate" --quiet
          
          # If you have other root files like manifest.json or robots.txt, you can add them here
          if [ -f build/manifest.json ]; then
            aws s3 cp build/manifest.json s3://${{ secrets.AWS_S3_BUCKET_NAME }}/manifest.json --cache-control "no-cache, no-store, must-revalidate" --quiet
          fi
          if [ -f build/robots.txt ]; then
            aws s3 cp build/robots.txt s3://${{ secrets.AWS_S3_BUCKET_NAME }}/robots.txt --cache-control "no-cache, no-store, must-revalidate" --quiet
          fi

      - name: Deployment summary
        run: echo "Deployment completed successfully."
        continue-on-error: true

      - name: Error Handling
        if: failure()
        run: echo "Deployment failed!"
