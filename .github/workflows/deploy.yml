name: Deploy to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build the project
        run: npm run build
        env:
          CI: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync with S3 bucket
        run: |
          # 1. Upload immutable assets (JS, CSS, Images) with long-term caching
          # These are in the assets/ folder which was copied from public/assets/
          aws s3 sync build/assets/ s3://${{ secrets.AWS_S3_BUCKET_NAME }}/assets/ --delete --cache-control "max-age=31536000, public, immutable"
          
          # 2. Upload the rest (index.html, manifest, robots.txt, and static/ folder) with NO CACHE
          # This ensures the browser always checks for the latest version of the entry point.
          aws s3 sync build/ s3://${{ secrets.AWS_S3_BUCKET_NAME }}/ --exclude "assets/*" --delete --cache-control "no-cache, no-store, must-revalidate"

      - name: Deployment summary
        run: echo "Deployment completed successfully."
        continue-on-error: true

      - name: Error Handling
        if: failure()
        run: echo "Deployment failed!"
